name: Sledgehammer CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      nova_release_tag:
        description: Nova3D release tag to source the SDK payload from
        required: false
        default: nova3d-sdk-latest
      nova_sdk_asset:
        description: Nova3D release asset containing the SDK payload
        required: false
        default: nova3d-sdk-macos.tar.gz

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-14
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        shell: bash
        run: |
          set -euo pipefail
          brew install cglm vulkan-loader

      - name: Download Nova SDK release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.NOVA3D_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .nova-sdk-download .nova-sdk
          gh release download "${{ github.event.inputs.nova_release_tag || 'nova3d-sdk-latest' }}" \
            --repo "${{ vars.NOVA3D_REPOSITORY }}" \
            --pattern "${{ github.event.inputs.nova_sdk_asset || 'nova3d-sdk-macos.tar.gz' }}" \
            --dir .nova-sdk-download
          tar -C .nova-sdk -xzf ".nova-sdk-download/${{ github.event.inputs.nova_sdk_asset || 'nova3d-sdk-macos.tar.gz' }}" --strip-components=1

      - name: Build Sledgehammer against Nova SDK
        shell: bash
        run: |
          set -euo pipefail
          make clean
          make NOVA_SDK_ROOT="$PWD/.nova-sdk"

      - name: Import signing certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$MACOS_CERTIFICATE_P12_BASE64" || -z "$MACOS_CERTIFICATE_PASSWORD" ]]; then
            echo "Signing certificate secrets not configured; skipping certificate import."
            exit 0
          fi
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          cert_path="$RUNNER_TEMP/macos-signing.p12"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')

      - name: Package Sledgehammer app bundle
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ci/package_macos_app.sh scripts/ci/sign_macos_bundle.sh scripts/ci/notarize_macos_app.sh
          mkdir -p .artifacts/apps
          ./scripts/ci/package_macos_app.sh \
            Sledgehammer \
            "$PWD/build/Sledgehammer" \
            "$PWD/.artifacts/apps/Sledgehammer.app" \
            "$PWD/build" \
            "$PWD/build/default.metallib" \
            "$PWD/build/MaterialSymbolsOutlined.ttf" \
            "$PWD/build/content" \
            "$PWD/build/shaders"
          MACOS_SIGNING_IDENTITY="${{ secrets.MACOS_SIGNING_IDENTITY || '-' }}" ./scripts/ci/sign_macos_bundle.sh "$PWD/.artifacts/apps/Sledgehammer.app"
          ditto -c -k --keepParent "$PWD/.artifacts/apps/Sledgehammer.app" "$PWD/.artifacts/Sledgehammer-macos-app.zip"

      - name: Notarize Sledgehammer app bundle
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$MACOS_SIGNING_IDENTITY" || "$MACOS_SIGNING_IDENTITY" == "-" || -z "$APPLE_NOTARY_APPLE_ID" || -z "$APPLE_NOTARY_TEAM_ID" || -z "$APPLE_NOTARY_APP_PASSWORD" ]]; then
            echo "Developer ID signing or notarization secrets not fully configured; skipping notarization."
            exit 0
          fi
          ./scripts/ci/notarize_macos_app.sh "$PWD/.artifacts/apps/Sledgehammer.app" "$PWD/.artifacts/Sledgehammer-macos-app.zip"

      - name: Validate Sledgehammer gatekeeper status
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$MACOS_SIGNING_IDENTITY" || "$MACOS_SIGNING_IDENTITY" == "-" || -z "$APPLE_NOTARY_APPLE_ID" || -z "$APPLE_NOTARY_TEAM_ID" || -z "$APPLE_NOTARY_APP_PASSWORD" ]]; then
            echo "Developer ID signing or notarization secrets not fully configured; skipping gatekeeper validation."
            exit 0
          fi
          spctl -a -vv "$PWD/.artifacts/apps/Sledgehammer.app"

      - name: Upload Sledgehammer artifact
        uses: actions/upload-artifact@v4
        with:
          name: sledgehammer-macos
          path: |
            .artifacts/apps/Sledgehammer.app
            .artifacts/Sledgehammer-macos-app.zip
            build/*.dylib
          if-no-files-found: error
          retention-days: 14